name: Daily Valve Battery Check

on:
  schedule:
    # מריץ כל יום בשעה 06:00 בבוקר (שעון UTC), שזה 08:00 או 09:00 בבוקר שעון ישראל
    - cron: '0 6 * * *'
  workflow_dispatch: # מאפשר לך להריץ את הבדיקה באופן ידני בלחיצת כפתור בממשק של GitHub

jobs:
  check-and-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run battery check and send email
        env:
          TUYA_ACCESS_ID: ${{ secrets.TUYA_ACCESS_ID }}
          TUYA_ACCESS_KEY: ${{ secrets.TUYA_ACCESS_KEY }}
          TUYA_DEVICE_ID: ${{ secrets.TUYA_DEVICE_ID }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
        run: python main.py
